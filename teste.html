<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teste</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background:#09090b; margin:0;">
<div id="root">
  <p style="color:white; font-family: sans-serif; text-align:center; margin-top: 40px;">
    Carregando teste... (se isso não desaparecer em 5s, os scripts externos não carregaram)
  </p>
</div>
<script type="text/babel">
  const { useState } = React;
  function Teste() {
    const [n, setN] = useState(0);
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <button
          onClick={() => setN(n + 1)}
          className="bg-emerald-500 text-zinc-950 font-bold px-6 py-4 rounded-lg text-xl"
        >
          Funcionou! Cliques: {n}
        </button>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Teste />);
</script>
</body>
</html>
