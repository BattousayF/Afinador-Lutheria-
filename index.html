<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Paizinho // Bancada</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
  html, body { background:#09090b; margin:0; }
  body { font-family: 'JetBrains Mono', monospace; }
.print-btn{display:block;margin:28px auto 0;padding:14px 36px;background:#2a1f0f;color:#f5f0e8;border:none;border-radius:8px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.1em;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.25);text-transform:uppercase}
.print-btn:hover{background:#3d2e1a}
@media print{.print-btn{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/jsx-source" id="app-source">
const { useState, useRef, useEffect, useCallback } = React;

// ---------------------------------------------------------------------------
// Constantes e helpers de teoria musical / DSP
// ---------------------------------------------------------------------------
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const SYNTONIC_COMMA = 21.51; // cents
const PYTHAGOREAN_COMMA = 23.46; // cents
const DEFAULT_PEAK_LABELS = ['Helmholtz (A0)', 'T(1,1) — Tampo', 'T(1,1) — Fundo / Acoplado', 'T(2,1)', 'T(1,2)', 'T(3,1)', 'Modo 7'];

function freqToMidiCents(freq, a4) {
  const midi = 69 + 12 * Math.log2(freq / a4);
  const rounded = Math.round(midi);
  const cents = (midi - rounded) * 100;
  const noteIndex = ((rounded % 12) + 12) % 12;
  const octave = Math.floor(rounded / 12) - 1;
  return { note: NOTE_NAMES[noteIndex], octave, cents, midi: rounded };
}

function noteToFreq(noteIndex, octave, a4) {
  const midi = (octave + 1) * 12 + noteIndex;
  return a4 * Math.pow(2, (midi - 69) / 12);
}

// Autocorrelação clássica (ACF) para detecção de pitch em sinal monofônico
function autoCorrelate(buf, sampleRate, silenceThreshold) {
  const SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < (silenceThreshold !== undefined ? silenceThreshold : 0.012)) return -1;

  let r1 = 0, r2 = SIZE - 1;
  const thres = 0.2;
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < thres) { r1 = i; break; } }
  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; } }
  const trimmed = buf.slice(r1, r2);
  const n = trimmed.length;
  if (n < 8) return -1;

  const c = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (let j = 0; j < n - i; j++) sum += trimmed[j] * trimmed[j + i];
    c[i] = sum;
  }
  let d = 0;
  while (d < n - 1 && c[d] > c[d + 1]) d++;
  let maxVal = -1, maxPos = -1;
  for (let i = d; i < n; i++) { if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; } }
  if (maxPos <= 0) return -1;
  const x1 = c[maxPos - 1] || 0, x2 = c[maxPos], x3 = c[maxPos + 1] || 0;
  const a = (x1 + x3 - 2 * x2) / 2, b = (x3 - x1) / 2;
  let T0 = maxPos;
  if (a) T0 = maxPos - b / (2 * a);
  if (T0 <= 0) return -1;
  return sampleRate / T0;
}

function findPeaks(magDb, sampleRate, fftSize, opts = {}) {
  const { fMin = 55, fMax = 1200, maxPeaks = 6 } = opts;
  const binHz = sampleRate / fftSize;
  const iMin = Math.max(1, Math.floor(fMin / binHz));
  const iMax = Math.min(magDb.length - 2, Math.ceil(fMax / binHz));
  const candidates = [];
  for (let i = iMin; i <= iMax; i++) {
    if (magDb[i] > magDb[i - 1] && magDb[i] > magDb[i + 1] && magDb[i] > -85) {
      candidates.push({ freq: i * binHz, db: magDb[i] });
    }
  }
  candidates.sort((a, b) => b.db - a.db);
  const selected = [];
  for (const c of candidates) {
    if (selected.length >= maxPeaks) break;
    if (selected.every((s) => Math.abs(s.freq - c.freq) > 14)) selected.push(c);
  }
  selected.sort((a, b) => a.freq - b.freq);
  return selected;
}

function formatHz(v) { return v >= 1000 ? `${(v / 1000).toFixed(3)} kHz` : `${v.toFixed(1)} Hz`; }
function uid() { return Math.random().toString(36).slice(2, 10); }

// ---------------------------------------------------------------------------
// Componente principal
// ---------------------------------------------------------------------------
function App() {
  const [activeTab, setActiveTab] = useState('tuner');
  const [micState, setMicState] = useState('idle'); // idle | requesting | granted | denied
  const [a4, setA4] = useState(440);

  // tuner state
  const [fixedTarget, setFixedTarget] = useState(false);
  const [sensitivity, setSensitivity] = useState(50); // 0-100, maior = mais sensível (capta sinais mais fracos)
  const [targetNote, setTargetNote] = useState(9); // A
  const [targetOctave, setTargetOctave] = useState(4);
  const [display, setDisplay] = useState({ freq: 0, note: '--', octave: '', cents: 0, silent: true });

  // modal tab state
  const [armed, setArmed] = useState(false);
  const [capturing, setCapturing] = useState(false);
  const [captureProgress, setCaptureProgress] = useState(0);
  const [peaks, setPeaks] = useState([]);
  const [instrument, setInstrument] = useState('');
  const [noteField, setNoteField] = useState('');
  const [measurements, setMeasurements] = useState([]);
  const [storageReady, setStorageReady] = useState(false);
  const [liveLevel, setLiveLevel] = useState(0);

  const audioCtxRef = useRef(null);
  const streamRef = useRef(null);
  const tunerAnalyserRef = useRef(null);
  const modalAnalyserRef = useRef(null);
  const timeBufRef = useRef(null);
  const modalTimeBufRef = useRef(null);
  const freqBufRef = useRef(null);
  const maxHoldRef = useRef(null);
  const frozenSpectrumRef = useRef(null);
  const freezeUntilRef = useRef(0);
  const frozenImageRef = useRef(null);
  const captureStartRef = useRef(0);
  const rafRef = useRef(null);

  const centsRef = useRef(0);
  const lastUIRef = useRef(0);
  const sensitivityRef = useRef(50);
  const lastValidPitchRef = useRef(0);
  const silentRef = useRef(true);
  const ringAnglesRef = useRef([0, 0, 0]);
  const lastTsRef = useRef(0);
  const a4Ref = useRef(440);
  const fixedTargetRef = useRef(false);
  const targetFreqRef = useRef(440);
  const armedRef = useRef(false);
  const capturingRef = useRef(false);

  const strobeCanvasRef = useRef(null);
  const spectrumCanvasRef = useRef(null);

  useEffect(() => { a4Ref.current = a4; }, [a4]);
  useEffect(() => { fixedTargetRef.current = fixedTarget; }, [fixedTarget]);
  useEffect(() => { sensitivityRef.current = sensitivity; }, [sensitivity]);
  useEffect(() => { targetFreqRef.current = noteToFreq(targetNote, targetOctave, a4); }, [targetNote, targetOctave, a4]);
  useEffect(() => { armedRef.current = armed; }, [armed]);
  useEffect(() => { capturingRef.current = capturing; }, [capturing]);

  // ---- Carregar histórico de medições (localStorage) ----
  useEffect(() => {
    try {
      const raw = localStorage.getItem('paizinho-modal-measurements');
      if (raw) setMeasurements(JSON.parse(raw));
    } catch (e) {
      // histórico corrompido ou inexistente — começa vazio
    } finally {
      setStorageReady(true);
    }
  }, []);

  function persistMeasurements(next) {
    setMeasurements(next);
    try {
      localStorage.setItem('paizinho-modal-measurements', JSON.stringify(next));
    } catch (e) {
      console.error('Falha ao salvar histórico', e);
    }
  }

  // ---- Ativar microfone ----
  async function enableMic() {
    setMicState('requesting');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      });
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const source = ctx.createMediaStreamSource(stream);

      const tunerAnalyser = ctx.createAnalyser();
      tunerAnalyser.fftSize = 2048;
      source.connect(tunerAnalyser);

      const modalAnalyser = ctx.createAnalyser();
      modalAnalyser.fftSize = 8192;
      modalAnalyser.smoothingTimeConstant = 0.15;
      modalAnalyser.minDecibels = -100;
      modalAnalyser.maxDecibels = -20;
      source.connect(modalAnalyser);

      audioCtxRef.current = ctx;
      streamRef.current = stream;
      tunerAnalyserRef.current = tunerAnalyser;
      modalAnalyserRef.current = modalAnalyser;
      timeBufRef.current = new Float32Array(tunerAnalyser.fftSize);
      modalTimeBufRef.current = new Float32Array(modalAnalyser.fftSize);
      freqBufRef.current = new Float32Array(modalAnalyser.frequencyBinCount);
      maxHoldRef.current = new Float32Array(modalAnalyser.frequencyBinCount).fill(-150);

      setMicState('granted');
    } catch (e) {
      setMicState('denied');
    }
  }

  useEffect(() => () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop());
    if (audioCtxRef.current) audioCtxRef.current.close();
  }, []);

  // ---- Desenho do disco estroboscópico ----
  function drawStrobe(ts) {
    const canvas = strobeCanvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const cssSize = canvas.clientWidth || 280;
    if (canvas.width !== cssSize * dpr) {
      canvas.width = cssSize * dpr;
      canvas.height = cssSize * dpr;
    }
    const ctx = canvas.getContext('2d');
    const size = cssSize;
    ctx.save();
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, size, size);

    const dt = lastTsRef.current ? Math.min((ts - lastTsRef.current) / 1000, 0.1) : 0;
    lastTsRef.current = ts;

    const cents = silentRef.current ? 0 : centsRef.current;
    const gain = 0.9; // graus por segundo por cent, por harmônico
    const inTune = !silentRef.current && Math.abs(cents) < 1.5;
    const accent = inTune ? '#34d399' : (Math.abs(cents) < 5 ? '#a3e635' : '#fbbf24');

    const cx = size / 2, cy = size / 2;
    const rings = [
      { r: size * 0.46, teeth: 36, h: 1 },
      { r: size * 0.34, teeth: 24, h: 2 },
      { r: size * 0.22, teeth: 16, h: 3 },
    ];

    rings.forEach((ring, idx) => {
      if (!silentRef.current) ringAnglesRef.current[idx] += ring.h * cents * gain * dt * (Math.PI / 180);
      const angle = ringAnglesRef.current[idx];
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.strokeStyle = accent;
      ctx.lineWidth = size * 0.018;
      ctx.shadowColor = accent;
      ctx.shadowBlur = silentRef.current ? 0 : 8;
      ctx.globalAlpha = silentRef.current ? 0.25 : 0.95;
      for (let i = 0; i < ring.teeth; i++) {
        const a0 = (i / ring.teeth) * Math.PI * 2;
        if (i % 2 === 0) {
          ctx.beginPath();
          ctx.arc(0, 0, ring.r, a0, a0 + (Math.PI * 2) / ring.teeth);
          ctx.stroke();
        }
      }
      ctx.restore();
    });

    // marcador fixo de referência (topo)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.strokeStyle = '#71717a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.49);
    ctx.lineTo(0, -size * 0.5);
    ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  // ---- Loop do afinador ----
  const tunerLoop = useCallback((ts) => {
    const analyser = tunerAnalyserRef.current;
    if (analyser) {
      analyser.getFloatTimeDomainData(timeBufRef.current);
      // sensibilidade 0-100 -> limiar de ruído entre 0.03 (pouco sensível) e 0.003 (muito sensível)
      const threshold = 0.03 - (sensitivityRef.current / 100) * (0.03 - 0.003);
      const freq = autoCorrelate(timeBufRef.current, audioCtxRef.current.sampleRate, threshold);
      if (freq > 55 && freq < 1500) {
        let cents, note, octave;
        if (fixedTargetRef.current) {
          cents = 1200 * Math.log2(freq / targetFreqRef.current);
          note = NOTE_NAMES[targetNote];
          octave = targetOctave;
        } else {
          const info = freqToMidiCents(freq, a4Ref.current);
          cents = info.cents; note = info.note; octave = info.octave;
        }
        centsRef.current = Math.max(-60, Math.min(60, cents));
        lastValidPitchRef.current = ts;
        silentRef.current = false;
        if (ts - lastUIRef.current > 80) {
          lastUIRef.current = ts;
          setDisplay({ freq, note, octave, cents, silent: false });
        }
      } else if (ts - lastValidPitchRef.current > 700) {
        silentRef.current = true;
        if (ts - lastUIRef.current > 150) {
          lastUIRef.current = ts;
          setDisplay((d) => (d.silent ? d : { ...d, silent: true }));
        }
      }
    }
    drawStrobe(ts);
    rafRef.current = requestAnimationFrame(tunerLoop);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [targetNote, targetOctave]);

  // ---- Desenho do espectro ----
  function drawSpectrum(magDb, peakList, frozen) {
    const canvas = spectrumCanvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.clientWidth || 320;
    const cssH = canvas.clientHeight || 200;
    if (canvas.width !== cssW * dpr) { canvas.width = cssW * dpr; canvas.height = cssH * dpr; }
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, cssW, cssH);

    const fMin = 55, fMax = 1200, dbMin = -100, dbMax = -20;
    const sampleRate = audioCtxRef.current ? audioCtxRef.current.sampleRate : 48000;
    const fftSize = modalAnalyserRef.current ? modalAnalyserRef.current.fftSize : 8192;
    const binHz = sampleRate / fftSize;
    const padL = 6, padR = 6, padT = 10, padB = 18;
    const w = cssW - padL - padR, h = cssH - padT - padB;

    const xForFreq = (f) => padL + ((Math.log10(f) - Math.log10(fMin)) / (Math.log10(fMax) - Math.log10(fMin))) * w;
    const yForDb = (db) => padT + (1 - (db - dbMin) / (dbMax - dbMin)) * h;

    // grade
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '9px monospace';
    [100, 200, 400, 800].forEach((f) => {
      const x = xForFreq(f);
      ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT + h); ctx.stroke();
      ctx.fillText(`${f}`, x - 8, cssH - 4);
    });

    // aviso de "congelado"
    if (frozen) {
      ctx.fillStyle = 'rgba(167,243,208,0.9)';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('● CAPTURADO — segurando p/ print', padL, padT - 2);
    }

    // traço do espectro
    ctx.beginPath();
    ctx.strokeStyle = frozen ? '#67e8f9' : 'rgba(251,191,36,0.55)';
    ctx.lineWidth = frozen ? 1.8 : 1.2;
    ctx.shadowColor = frozen ? '#67e8f9' : 'transparent';
    ctx.shadowBlur = frozen ? 6 : 0;
    let first = true;
    for (let x = 0; x <= w; x += 1) {
      const f = Math.pow(10, Math.log10(fMin) + (x / w) * (Math.log10(fMax) - Math.log10(fMin)));
      const bin = Math.round(f / binHz);
      const db = magDb[bin] !== undefined ? Math.max(dbMin, magDb[bin]) : dbMin;
      const y = yForDb(db);
      if (first) { ctx.moveTo(padL + x, y); first = false; } else { ctx.lineTo(padL + x, y); }
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // picos marcados
    peakList.forEach((p) => {
      const x = xForFreq(p.freq);
      const y = yForDb(p.db);
      const peakColor = frozen ? '#fde047' : 'rgba(52,211,153,0.7)';
      ctx.strokeStyle = peakColor;
      ctx.setLineDash([2, 2]);
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, padT + h); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = frozen ? '#fde047' : '#34d399';
      ctx.shadowColor = frozen ? '#fde047' : 'transparent';
      ctx.shadowBlur = frozen ? 5 : 0;
      ctx.beginPath(); ctx.arc(x, y, frozen ? 3.5 : 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    });

    ctx.restore();
  }

  // ---- Loop do modo modal (espectro ao vivo + detecção de batida) ----
  const modalLoop = useCallback((ts) => {
    const analyser = modalAnalyserRef.current;
    if (analyser) {
      analyser.getFloatTimeDomainData(modalTimeBufRef.current);
      let rms = 0;
      for (let i = 0; i < modalTimeBufRef.current.length; i++) rms += modalTimeBufRef.current[i] * modalTimeBufRef.current[i];
      rms = Math.sqrt(rms / modalTimeBufRef.current.length);
      setLiveLevel((prev) => prev * 0.7 + rms * 0.3);

      analyser.getFloatFrequencyData(freqBufRef.current);

      if (armedRef.current && !capturingRef.current && rms > 0.035) {
        capturingRef.current = true;
        setCapturing(true);
        captureStartRef.current = ts;
        maxHoldRef.current.fill(-150);
      }
      if (capturingRef.current) {
        for (let i = 0; i < freqBufRef.current.length; i++) {
          if (freqBufRef.current[i] > maxHoldRef.current[i]) maxHoldRef.current[i] = freqBufRef.current[i];
        }
        const elapsed = ts - captureStartRef.current;
        setCaptureProgress(Math.min(1, elapsed / 1400));
        if (elapsed >= 1400) {
          capturingRef.current = false;
          armedRef.current = false;
          setCapturing(false);
          setArmed(false);
          const found = findPeaks(maxHoldRef.current, audioCtxRef.current.sampleRate, analyser.fftSize, { maxPeaks: 7 });
          const labeled = found.map((p, idx) => ({ ...p, label: DEFAULT_PEAK_LABELS[idx] || `Modo ${idx + 1}`, id: uid() }));
          setPeaks(labeled);
          frozenSpectrumRef.current = maxHoldRef.current.slice();
          freezeUntilRef.current = ts + 3500;
          drawSpectrum(maxHoldRef.current, labeled, true);
          if (spectrumCanvasRef.current) {
            frozenImageRef.current = spectrumCanvasRef.current.toDataURL('image/jpeg', 0.88);
          }
        } else {
          drawSpectrum(maxHoldRef.current, [], true);
        }
      } else if (frozenSpectrumRef.current && ts < freezeUntilRef.current) {
        drawSpectrum(frozenSpectrumRef.current, peaks, true);
      } else {
        drawSpectrum(freqBufRef.current, peaks, false);
      }
    }
    rafRef.current = requestAnimationFrame(modalLoop);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [peaks]);

  // ---- Gerenciar qual loop está ativo ----
  useEffect(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (micState !== 'granted') return;
    if (activeTab === 'tuner') rafRef.current = requestAnimationFrame(tunerLoop);
    else rafRef.current = requestAnimationFrame(modalLoop);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [activeTab, micState, tunerLoop, modalLoop]);

  function startListeningForTap() {
    setPeaks([]);
    setArmed(true);
  }
  function cancelTap() {
    setArmed(false);
    setCapturing(false);
    capturingRef.current = false;
    armedRef.current = false;
    setCaptureProgress(0);
  }
  function updatePeakLabel(id, label) {
    setPeaks((prev) => prev.map((p) => (p.id === id ? { ...p, label } : p)));
  }
  function getNextSerial() {
    const key = 'paizinho-cert-serial';
    const current = parseInt(localStorage.getItem(key) || '0', 10);
    const next = current + 1;
    localStorage.setItem(key, String(next));
    return `PAI-${String(next).padStart(5, '0')}`;
  }
  function saveMeasurement() {
    if (!peaks.length) return;
    const record = {
      id: uid(),
      serial: getNextSerial(),
      timestamp: new Date().toISOString(),
      instrument: instrument.trim() || 'Sem nome',
      note: noteField.trim(),
      a4,
      peaks: peaks.map((p) => ({ freq: p.freq, db: p.db, label: p.label })),
      spectrumImage: frozenImageRef.current || null,
    };
    persistMeasurements([record, ...measurements]);
    setNoteField('');
  }
  function deleteMeasurement(id) {
    persistMeasurements(measurements.filter((m) => m.id !== id));
  }
  function getModeType(label) {
    const l = (label || '').toLowerCase();
    if (l.includes('helmholtz') || l.includes('a0') || l.includes('t(1,1)1') || l.includes('t(1,1)\u2081')) return 'resson\u00e2ncia de ar';
    if (l.includes('tampo') || l.includes('t(1,1)2') || l.includes('t(1,1)\u2082')) return 'monopolo \u00b7 tampo';
    if (l.includes('fundo') || l.includes('acoplado') || l.includes('t(1,1)3') || l.includes('t(1,1)\u2083')) return 'monopolo \u00b7 fundo';
    if (l.includes('t(2,1)')) return 'dipolo cruzado';
    if (l.includes('t(1,2)')) return 'dipolo longitudinal';
    if (l.includes('t(3,1)')) return 'tripolo cruzado';
    return 'modo superior';
  }
  function generateCertificate(m) {
    const tampo = m.peaks.find(p => { const l = (p.label||'').toLowerCase(); return l.includes('tampo')||l.includes('t(1,1)2')||l.includes('t(1,1)\u2082'); }) || m.peaks[1];
    const fundo = m.peaks.find(p => { const l = (p.label||'').toLowerCase(); return l.includes('fundo')||l.includes('acoplado')||l.includes('t(1,1)3')||l.includes('t(1,1)\u2083'); }) || m.peaks[2];
    let semitoneBlock = '';
    if (tampo && fundo && fundo.freq > tampo.freq) {
      const st = 12 * Math.log2(fundo.freq / tampo.freq);
      const pct = Math.min(100, Math.max(0, (st / 8) * 100));
      const cor = st < 2 || st > 6 ? '#c0392b' : st < 3 || st > 5 ? '#e67e22' : '#27ae60';
      semitoneBlock = `<div class="st-box">
        <div class="st-title">Posicionamento do fundo em rela\u00e7\u00e3o ao tampo</div>

  const commaPyth = (display.cents || 0) / PYTHAGOREAN_COMMA;

              {fixedTarget && (
                <div className="flex items-center gap-1 text-xs">
                  <select value={targetNote} onChange={(e) => setTargetNote(Number(e.target.value))} className="bg-zinc-800 border border-zinc-700 rounded px-1.5 py-0.5">
                    {NOTE_NAMES.map((n, i) => <option key={n} value={i}>{n}</option>)}
                  </select>
                  <select value={targetOctave} onChange={(e) => setTargetOctave(Number(e.target.value))} className="bg-zinc-800 border border-zinc-700 rounded px-1.5 py-0.5">
                    {[1, 2, 3, 4, 5, 6].map((o) => <option key={o} value={o}>{o}</option>)}
                  </select>
                </div>
              )}
            </div>

            <div className="flex items-center gap-3 border-t border-zinc-800 pt-3 mt-3">
              <span className="text-xs text-zinc-400 shrink-0">Sensibilidade</span>
              <input
                type="range" min={0} max={100} value={sensitivity}
                onChange={(e) => setSensitivity(Number(e.target.value))}
                className="flex-1 accent-emerald-500"
              />
              <span className="text-xs text-zinc-500 w-8 text-right shrink-0">{sensitivity}</span>
            </div>
          </div>
        )}

        {/* ---------------- ABA ANÁLISE MODAL ---------------- */}
        {micState === 'granted' && activeTab === 'modal' && (
          <div className="space-y-4">
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 sm:p-6 scanlines">
              <canvas ref={spectrumCanvasRef} className="w-full" style={{ height: 200 }} />

              <div className="flex items-center gap-2 mt-2 mb-4">
                <div className="text-xs text-zinc-500 w-16">nível mic</div>
                <div className="flex-1 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                  <div className="h-full bg-zinc-500" style={{ width: `${Math.min(100, liveLevel * 600)}%` }} />
                </div>
              </div>

              {!armed && !capturing && (
                <button
                  onClick={startListeningForTap}
                  className="w-full flex items-center justify-center gap-2 py-3 bg-amber-500 hover:bg-amber-400 text-zinc-950 font-disp font-semibold rounded-md text-sm"
                >
                  Escutar batida no tampo
                </button>
              )}
              {armed && !capturing && (
                <div className="flex items-center gap-3">
                  <button onClick={cancelTap} className="px-3 py-3 bg-zinc-800 text-zinc-400 rounded-md text-sm flex items-center gap-1">cancelar</button>
                  <div className="flex-1 text-center text-amber-400 text-sm font-disp pulse-slow">● AGUARDANDO BATIDA SECA...</div>
                </div>
              )}
              {capturing && (
                <div>
                  <div className="text-center text-emerald-400 text-sm font-disp mb-1">capturando decaimento...</div>
                  <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                    <div className="h-full bg-emerald-400" style={{ width: `${captureProgress * 100}%` }} />
                  </div>
                </div>
              )}
            </div>

            {peaks.length > 0 && (
              <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                <h3 className="font-disp text-sm font-semibold text-zinc-300 mb-1">Picos detectados</h3>
                <p className="text-xs text-zinc-500 mb-3">Ordem sugerida por frequência — confira e renomeie conforme sua identificação acústica (Chladni, comparação de amplitude, etc).</p>
                <div className="space-y-2">
                  {peaks.map((p) => (
                    <div key={p.id} className="flex items-center gap-2 bg-zinc-800/60 rounded-md p-2">
                      <div className="font-disp text-sm text-amber-400 w-20 shrink-0">{formatHz(p.freq)}</div>
                      <div className="text-xs text-zinc-500 w-14 shrink-0">{p.db.toFixed(0)} dB</div>
                      <input
                        value={p.label}
                        onChange={(e) => updatePeakLabel(p.id, e.target.value)}
                        className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-1 text-xs text-zinc-200"
                      />
                    </div>
                  ))}
                </div>

                <div className="flex flex-wrap items-center gap-2 mt-4 pt-3 border-t border-zinc-800">
                  <input
                    list="instrument-list"
                    value={instrument}
                    onChange={(e) => setInstrument(e.target.value)}
                    placeholder="instrumento (ex: Violão 5)"
                    className="flex-1 min-w-36 bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5 text-xs text-zinc-200"
                  />
                  <datalist id="instrument-list">
                    {instrumentNames.map((n) => <option key={n} value={n} />)}
                  </datalist>
                  <input
                    value={noteField}
                    onChange={(e) => setNoteField(e.target.value)}
                    placeholder="observação (ex: antes da colagem do fundo)"
                    className="flex-1 min-w-44 bg-zinc-800 border border-zinc-700 rounded px-2 py-1.5 text-xs text-zinc-200"
                  />
                  <button onClick={saveMeasurement} className="flex items-center gap-1 px-3 py-1.5 bg-emerald-500 hover:bg-emerald-400 text-zinc-950 rounded-md text-xs font-disp font-semibold">
                    salvar
                  </button>
                </div>
              </div>
            )}

            {storageReady && measurements.length > 0 && (
              <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                <h3 className="font-disp text-sm font-semibold text-zinc-300 mb-3">Histórico</h3>
                <div className="space-y-2 max-h-80 overflow-y-auto">
                  {measurements.map((m) => (
                    <details key={m.id} className="bg-zinc-800/50 rounded-md">
                      <summary className="cursor-pointer px-3 py-2 text-xs flex items-center justify-between">
                        <div className="flex flex-col">
                          <span className="text-zinc-200 font-disp">{m.instrument}</span>
                          {m.serial && <span className="text-amber-600/70" style={{ fontSize: '10px', letterSpacing: '0.1em' }}>{m.serial}</span>}
                        </div>
                        <span className="text-zinc-500">{new Date(m.timestamp).toLocaleDateString('pt-BR')}</span>
                      </summary>
                      <div className="px-3 pb-3">
                        {m.note && <div className="text-xs text-zinc-500 italic mb-2">{m.note}</div>}
                        {m.peaks.map((p, i) => (
                          <div key={i} className="text-xs text-zinc-400 flex justify-between">
                            <span>{p.label}</span><span className="text-amber-400/80">{formatHz(p.freq)}</span>
                          </div>
                        ))}
                        <div className="flex items-center gap-3 mt-3 pt-2 border-t border-zinc-700/50">
                          <button
                            onClick={() => generateCertificate(m)}
                            className="flex items-center gap-1 px-3 py-1.5 bg-amber-500/20 hover:bg-amber-500/30 text-amber-400 rounded text-xs font-disp font-semibold border border-amber-500/30"
                          >
                            ⬡ Gerar Certificado
                          </button>
                          <button onClick={() => deleteMeasurement(m.id)} className="flex items-center gap-1 text-xs text-rose-400 hover:text-rose-300">
                            excluir
                          </button>
                        </div>
                      </div>
                    </details>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

<script>
  (function () {
    try {
      var src = document.getElementById('app-source').textContent;
      var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
      eval(out);
    } catch (err) {
      document.body.innerHTML = '<pre style="color:#ff6b6b; white-space:pre-wrap; padding:20px; font-family:monospace;">ERRO: ' + err.message + '\n' + (err.stack || '') + '</pre>';
    }
  })();
</script>
</body>
</html>
