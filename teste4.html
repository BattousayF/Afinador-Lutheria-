<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teste 2 - Diagnóstico</title>
<script>
  window.__erros = [];
  function logErro(txt) {
    window.__erros.push(txt);
    var el = document.getElementById('debug');
    if (el) el.innerText = window.__erros.join('\n\n');
  }
  window.addEventListener('error', function (e) {
    if (e.target && e.target.tagName === 'SCRIPT') {
      logErro('FALHA AO CARREGAR SCRIPT: ' + e.target.src);
    } else {
      logErro('ERRO JS: ' + (e.message || 'desconhecido') + '\nem: ' + (e.filename || '?') + ':' + (e.lineno || '?'));
    }
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    logErro('PROMISE REJEITADA: ' + e.reason);
  });
  setTimeout(function () {
    if (typeof React === 'undefined') logErro('React não carregou (variável React indefinida após 8s)');
    if (typeof ReactDOM === 'undefined') logErro('ReactDOM não carregou (variável ReactDOM indefinida após 8s)');
    if (typeof Babel === 'undefined') logErro('Babel não carregou (variável Babel indefinida após 8s)');
    if (window.__erros.length === 0) logErro('Nenhum erro capturado, mas o app não renderizou. Pode ser o Babel não estar processando o script type=text/babel.');
  }, 8000);
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background:#09090b; margin:0; color:white; font-family: sans-serif;">
<div id="root">
  <p style="text-align:center; margin-top: 40px;">Carregando teste 2...</p>
</div>
<div id="debug" style="white-space:pre-wrap; color:#ff6b6b; font-family: monospace; font-size: 13px; padding: 20px; border-top: 1px solid #333; margin-top: 20px;"></div>
<script type="text/babel" data-presets="react">
  try {
    const { useState } = React;
    function Teste() {
      const [n, setN] = useState(0);
      return (
        <div style={{ minHeight: '50vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <button
            onClick={() => setN(n + 1)}
            className="bg-emerald-500 text-zinc-950 font-bold px-6 py-4 rounded-lg text-xl"
          >
            Funcionou! Cliques: {n}
          </button>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Teste />);
  } catch (err) {
    logErro('ERRO AO RENDERIZAR: ' + err.message + '\n' + err.stack);
  }
</script>
</body>
</html>
