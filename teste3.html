<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Teste 3 - Diagnóstico</title>
<script>
  window.__log = [];
  function logErro(txt) {
    window.__log.push(txt);
    var el = document.getElementById('debug');
    if (el) el.innerText = window.__log.join('\n\n');
  }
  window.addEventListener('error', function (e) {
    if (e.target && e.target.tagName === 'SCRIPT') {
      logErro('✗ FALHA AO CARREGAR: ' + e.target.src);
    } else {
      logErro('✗ ERRO JS: ' + (e.message || 'desconhecido') + '\nem: ' + (e.filename || '?') + ':' + (e.lineno || '?'));
    }
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    logErro('✗ PROMISE REJEITADA: ' + e.reason);
  });
</script>
<script src="https://cdn.tailwindcss.com" onload="logErro('✓ Tailwind carregou')"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" onload="logErro('✓ React carregou, typeof React = ' + typeof React)"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onload="logErro('✓ ReactDOM carregou, typeof ReactDOM = ' + typeof ReactDOM)"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" onload="logErro('✓ Babel carregou, typeof Babel = ' + typeof Babel)"></script>
</head>
<body style="background:#09090b; margin:0; color:white; font-family: sans-serif;">
<p style="text-align:center; margin-top: 20px;">Diagnóstico — aguarde 5s</p>
<div id="debug" style="white-space:pre-wrap; color:#6bff8f; font-family: monospace; font-size: 13px; padding: 20px; border-top: 1px solid #333; margin-top: 10px;"></div>
<div id="root"></div>
<script>
  setTimeout(function () {
    try {
      var codigoTeste = 'const teste = () => "ok"; document.getElementById("root").innerText = "JSX simples: " + teste();';
      var resultado = Babel.transform(codigoTeste, { presets: ['react'] }).code;
      logErro('✓ Babel.transform funcionou. Saída:\n' + resultado);
      eval(resultado);
      logErro('✓ Execução do código transformado funcionou');
    } catch (err) {
      logErro('✗ ERRO no Babel.transform manual: ' + err.message);
    }
  }, 3000);
</script>
</body>
</html>
